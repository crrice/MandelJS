<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>MandelJS — a fractal explorer</title>
	<link rel="stylesheet" href="index.css" />
</head>
<body>
	<main>
		<h1>MandelJS</h1>
		<p class="sub">A from-scratch Mandelbrot explorer, drawn pixel by pixel on a canvas
			(<code>z ↦ z² + c</code>). Drag a box over a region and hit <b>zoom</b> to dive in;
			<b>reset</b> returns to the full view.</p>

		<div class="scroll">
			<div class="easel">
				<canvas class="fractal" width="640" height="320"></canvas>
			</div>
		</div>

		<div class="controls">
			<button class="btn zoom-button" type="button">⤢ zoom</button>
			<button class="btn reset-button" type="button">↺ reset</button>
			<button class="btn mode-button" type="button">coloring: escape-time</button>
		</div>

		<div class="controls color-controls">
			<label class="field">palette
				<select class="palette-select">
					<option value="escape">escape</option>
					<option value="subtle">subtle</option>
					<option value="jupiter">jupiter</option>
					<option value="ember">ember</option>
					<option value="abyss">abyss</option>
					<option value="twilight">twilight</option>
				</select>
			</label>
			<label class="field checkbox"><input class="wrap-toggle" type="checkbox" /> wrap</label>
			<label class="field">density
				<input class="density-slider" type="range" min="8" max="128" step="1" />
			</label>
		</div>
	</main>

	<script src="index.js"></script>
</body>
</html>
